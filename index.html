<style>
  :root{

    --line:#E4E1D8;
    --card:#FFFFFF;

    --bad:#B0413E;

  *{box-sizing:border-box;}

  }
  h1,h2,h3,.serif{ font-family:'Newsreader', serif; }
  .app{ max-width:720px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; padding-bottom:100px; }

  header{ position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:1px solid var(--line); padding:16px 18px 0; }
  .header-row{ display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; flex-direction:column; }
  .brand .eyebrow{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lav-deep); font-weight:700; }
  .brand h1{ font-size:21px; margin:2px 0 12px; font-style:italic; font-weight:600; }
  .header-btns{ display:flex; gap:6px; margin-bottom:10px; }
  .icon-btn{ border:1px solid var(--line); background:var(--card); border-radius:10px; padding:7px 10px; font-size:13px; cursor:pointer; color:var(--ink); }
  .icon-btn:active{ transform:scale(0.97); }
  .tabs{ display:flex; gap:4px; }
  .tab{ flex:1; text-align:center; padding:10px 0; font-size:14px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer; }
  .tab.active{ color:var(--ink); border-bottom:2px solid var(--ink); }

  main{ padding:18px; }
  .step-dots{ display:flex; gap:6px; justify-content:center; margin-bottom:18px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--line); }
  .dot.active{ background:var(--ink); width:18px; border-radius:3px; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow); }
  .card h3{ font-size:15px; margin:0 0 10px; font-weight:700; font-style:normal; }
  label.field-label{ display:block; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:6px; }

  .chip-grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ border:1px solid var(--line); background:var(--bg); border-radius:20px; padding:8px 14px; font-size:13px; cursor:pointer; user-select:none; transition:.15s; }
  .chip.selected{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.lav-selected{ background:var(--lav); color:var(--ink); border-color:var(--lav-deep); }

  input[type=text], input[type=search], textarea, select{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px;
    font-size:14px; font-family:inherit; background:#fff; color:var(--ink);
  }
  textarea{ resize:vertical; min-height:70px; }
  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; }

  button.primary{
    background:var(--ink); color:#fff; border:none; border-radius:12px;
    padding:14px 16px; font-size:15px; font-weight:700; cursor:pointer; width:100%;
  }
  button.primary:disabled{ opacity:0.4; }
  button.secondary{
    background:transparent; color:var(--ink); border:1px solid var(--line);
    border-radius:12px; padding:12px 16px; font-size:14px; font-weight:600; cursor:pointer;
  }
  button.ghost{ background:none; border:none; color:var(--lav-deep); font-weight:700; font-size:13px; cursor:pointer; padding:6px 0; }

  .kw-card.selected{ border-color:var(--ink); background:#F1EEFB; }
  .kw-top{ display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:14px; }
  .kw-tier{ font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; }
  .tier-red{ background:#FBE2E1; color:var(--bad); }
  .tier-green{ background:#E1F0E7; color:var(--ok); }
  .tier-blue{ background:#E3EAFB; color:#3355A8; }
  .kw-reason{ font-size:12px; color:var(--muted); margin-top:4px; }
  .kw-title-ex{ font-size:12px; color:var(--ink); margin-top:4px; font-style:italic; }

  .imgs-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; padding:4px; border-radius:10px; transition:.15s; }

  .thumb{ width:56px; height:56px; border-radius:8px; object-fit:cover; border:1px solid var(--line); }
  .upload-box{ width:56px; height:56px; border:1.5px dashed var(--line); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--muted); cursor:pointer; }

  .progress-list{ list-style:none; padding:0; margin:0; }
  .progress-list li{ display:flex; align-items:center; gap:8px; padding:8px 0; font-size:14px; border-bottom:1px solid var(--line); }
  .progress-bar-outer{ height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin:16px 0; }
  .progress-bar-inner{ height:100%; background:var(--ink); transition:width .4s; }
  .spinner{ width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--ink); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .accordion-item{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; background:#fff; }
  .accordion-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; font-weight:700; font-size:14px; }
  .accordion-body{ padding:0 16px 16px; display:none; }
  .accordion-item.open .accordion-body{ display:block; }
  .sec-block{ border-top:1px dashed var(--line); padding:10px 0; }
  .sec-title-row{ display:flex; justify-content:space-between; align-items:center; }
  .sec-title{ font-size:12px; font-weight:800; color:var(--lav-deep); letter-spacing:0.03em; }
  .sec-copy{ font-size:11px; color:var(--muted); background:none; border:none; cursor:pointer; }
  .sec-content{ font-size:13.5px; line-height:1.65; white-space:pre-wrap; margin-top:6px; }

  .tag-badge{ display:inline-block; padding:3px 9px; border-radius:12px; font-size:12px; margin:2px 3px 0 0; }
  .tag-lg{ background:var(--ink); color:#fff; }
  .tag-md{ background:var(--lav); color:var(--ink); }
  .tag-sm{ background:#EDEBE3; color:var(--muted); }

  .verify-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .verify-item{ border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:12px; }
  .verify-item b{ display:block; font-size:11px; color:var(--muted); }

  .hist-item{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; background:#fff; cursor:pointer; }
  .hist-item .meta{ font-size:11px; color:var(--muted); margin-top:2px; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(26,26,46,0.5); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
  .modal{ background:var(--bg); width:100%; max-width:720px; max-height:88vh; overflow-y:auto; border-radius:20px 20px 0 0; padding:20px; }
  .modal-close{ text-align:center; margin-top:10px; }
  .empty{ text-align:center; color:var(--muted); font-size:13px; padding:40px 0; }
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; z-index:200; opacity:0; transition:.25s; pointer-events:none; }
  .toast.show{ opacity:1; }
  .small-muted{ font-size:12px; color:var(--muted); }
</style>
</head>

/* ============================= STORAGE HELPERS ============================= */
function lsGet(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; }
}
function lsSet(key, val){
  try{
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  }catch(e){
    console.warn('[RONAI] localStorage 저장 실패, 용량 정리 시도:', key, e);
    try{
      // 저장공간이 꽉 찼을 가능성이 높음: 오래된 result:* 항목부터 지우고 재시도
      const hist = lsGet('ronai:hist', []);
      if(Array.isArray(hist) && hist.length){
        const keepIds = new Set(hist.slice(0, 10).map(h=>h && h.id));
        for(let i=localStorage.length-1; i>=0; i--){
          const k = localStorage.key(i);
          if(k && k.startsWith('ronai:result:')){
            const id = k.replace('ronai:result:','');
            if(!keepIds.has(id)) localStorage.removeItem(k);
          }
        }
      }
      localStorage.setItem(key, JSON.stringify(val));
      console.log('[RONAI] 정리 후 저장 성공:', key);
      return true;
    }catch(e2){
      console.error('[RONAI] 정리 후에도 저장 실패:', key, e2);
      return false;
    }
  }
}
async function redisGet(key){
  try{
    const res = await fetch(`${REDIS_URL}/get/${encodeURIComponent(key)}`, { headers:{Authorization:`Bearer ${REDIS_TOKEN}`} });
    const data = await res.json();
    if(!data.result) return null;
    let parsed = JSON.parse(data.result);
    // defensive: if the value came back double-encoded (a JSON string containing JSON), parse once more
    if(typeof parsed === 'string'){
      try{ parsed = JSON.parse(parsed); }catch(e){ /* it really was just a string, leave as-is */ }
    }
    return parsed;
  }catch(e){ console.error('[RONAI] redisGet 실패:', key, e); return null; }
}
async function redisSet(key, val){
  try{
    await fetch(`${REDIS_URL}/set/${encodeURIComponent(key)}`, {
      method:'POST', headers:{Authorization:`Bearer ${REDIS_TOKEN}`}, body: JSON.stringify(val)
    });
  }catch(e){}
}
async function redisDel(key){
  try{ await fetch(`${REDIS_URL}/del/${encodeURIComponent(key)}`, { headers:{Authorization:`Bearer ${REDIS_TOKEN}`} }); }catch(e){}
}

/* ============================= GEMINI API ============================= */
function getApiKey(){ return localStorage.getItem('ronai:gemini_key') || ""; }

async function callGemini({ prompt, images=[], useWebSearch=false, maxTokens=2000, system=SYSTEM_PROMPT, wantJson=false, onRetry=null, _retried=false }){
  const apiKey = getApiKey();
  if(!apiKey){ openApiKeyModal(); throw new Error('NO_KEY'); }
  const parts = [];
  images.forEach(img => parts.push({ inline_data:{ mime_type: img.mime, data: img.base64 } }));
  parts.push({ text: wantJson ? prompt + "\n\n반드시 JSON만 응답하고 마크다운 코드블록(```)은 절대 사용하지 마." : prompt });

  const body = {
    contents:[{ role:'user', parts }],
    generationConfig:{ maxOutputTokens: maxTokens, temperature:0.9, thinkingConfig:{ thinkingBudget: 0 } },
    systemInstruction: { parts:[{ text: system }] }
  };
  if(useWebSearch){ body.tools = [{ googleSearch:{} }]; }

  let lastErr = null;
  for(const model of MODEL_CANDIDATES){
    for(const useThinkingConfig of [true, false]){
      try{
        const reqBody = JSON.parse(JSON.stringify(body));
        if(!useThinkingConfig) delete reqBody.generationConfig.thinkingConfig;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'x-goog-api-key': apiKey },
          body: JSON.stringify(reqBody)
        });
        if(!res.ok){
          const errText = await res.text();
          lastErr = new Error(`[${model}] ${res.status}: ${errText}`);
          if(res.status === 400 && /thinking/i.test(errText) && useThinkingConfig){ continue; } // retry same model without thinkingConfig
          if(res.status === 404 || /not found|not supported/i.test(errText)){ break; } // try next model
          throw lastErr;
        }
        const data = await res.json();
        const candidate = data.candidates && data.candidates[0];
        const text = ((candidate && candidate.content && candidate.content.parts) || [])
          .filter(p => !p.thought) // strip any internal "thinking" content, only keep real output
          .map(p=>p.text||'').join('');
        if(!text) { lastErr = new Error(`[${model}] empty response`); break; }
        // if the response got cut off, automatically retry once with a bigger token budget
        // (only fires when actually needed — not a blanket cost increase)
        if(candidate && candidate.finishReason === 'MAX_TOKENS' && !_retried && maxTokens < 8000){
          const newMax = Math.min(maxTokens + 2000, 8000);
          console.warn(`[RONAI] "${model}" 응답이 잘려서 토큰 한도를 늘려 재시도합니다 (기존 ${maxTokens} → ${newMax})`);
          if(onRetry) onRetry(newMax);
          return callGemini({ prompt, images, useWebSearch, maxTokens: newMax, system, wantJson, onRetry, _retried:true });
        }
        return text;
      }catch(e){
        lastErr = e;
        continue;
      }
    }
  }
  throw lastErr || new Error('Gemini 호출 실패');
}

function safeParseJson(text){
  try{
    const cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
    return JSON.parse(cleaned);
  }catch(e){ return null; }
}

let currentTab = 'create';
function switchTab(tab){
  if(state.isGenerating && tab==='history'){ toast('콘텐츠 생성이 끝나면 히스토리를 확인할 수 있어요'); return; }
  currentTab = tab;
  document.getElementById('tab-create').classList.toggle('active', tab==='create');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  const main = document.getElementById('main');
  main.innerHTML = `<div class="empty">불러오는 중...</div>`; // clear stale content immediately so nothing looks frozen
  try{
    const result = render();
    if(result && typeof result.catch === 'function'){
      result.catch(err=>{
        console.error('[RONAI] 탭 전환 렌더링 실패:', err);
        main.innerHTML = `<div class="empty">화면을 불러오지 못했어요.<br>(${escapeHtml(String(err && err.message || err))})<br><br>새로고침 후 다시 시도해주세요.</div>`;
      });
    }
  }catch(err){
    console.error('[RONAI] 탭 전환 렌더링 실패:', err);
    main.innerHTML = `<div class="empty">화면을 불러오지 못했어요.<br>(${escapeHtml(String(err && err.message || err))})<br><br>새로고침 후 다시 시도해주세요.</div>`;
  }
}

function render(){ return currentTab==='create' ? renderCreate() : renderHistory(); }

function renderCreate(){
  const main = document.getElementById('main');
  let html = `<div class="step-dots">`;
  for(let i=1;i<=4;i++) html += `<div class="dot ${state.step===i?'active':''}"></div>`;
  html += `</div>`;
  if(state.step===1) html += renderStep1();
  else if(state.step===2) html += renderStep2();
  else if(state.step===3) html += renderStep3();
  else if(state.step===4) html += renderStep4();
  main.innerHTML = html;
  attachStepEvents();
}

  if(toggleBtn) toggleBtn.onclick = ()=>{ state.showProductCard = !state.showProductCard; renderCreate(); };

  const imgInput = document.getElementById('product-img-input');

    for(const file of files){
      if(state.productImages.length >= 10) break;
      const base64 = await fileToBase64(file);
      state.productImages.push({ base64, mime:file.type });
    }
    renderCreate();
  };
  if(imgInput) imgInput.onchange = (e)=> addProductImages(e.target.files);
  setupImageDropzone(document.getElementById('product-img-row'), addProductImages);

    if(!state.productName){ toast('제품명을 입력해주세요'); return; }
    searchBtn.textContent = '검색중...';

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// generic drag-and-drop wiring for an image dropzone: highlights on drag, calls onFiles(FileList) on drop
function setupImageDropzone(zoneEl, onFiles){
  if(!zoneEl) return;
  ['dragenter','dragover'].forEach(evt=>{
    zoneEl.addEventListener(evt, e=>{ e.preventDefault(); e.stopPropagation(); zoneEl.classList.add('drag-over'); });
  });
  ['dragleave','dragend'].forEach(evt=>{
    zoneEl.addEventListener(evt, e=>{ e.preventDefault(); e.stopPropagation(); zoneEl.classList.remove('drag-over'); });
  });
  zoneEl.addEventListener('drop', e=>{
    e.preventDefault(); e.stopPropagation();
    zoneEl.classList.remove('drag-over');
    const files = e.dataTransfer && e.dataTransfer.files;
    if(files && files.length){
      const imageFiles = Array.from(files).filter(f=>f.type.startsWith('image/'));
      if(imageFiles.length) onFiles(imageFiles);
      else toast('이미지 파일만 올릴 수 있어요');
    }
  });
}

async function startGeneration(){
  currentTab = 'create';
  state.isGenerating = true;
  document.getElementById('tab-create').classList.add('active');
  document.getElementById('tab-history').classList.remove('active');
  state.step = 3;
  state.genProgress = state.selectedChannels.map(c=>({channel:c, status:'pending'}));
  state.results = {};
  renderCreate();

  const ctxBlock = `[주제/제품]: ${state.topic}
[메인 키워드]: ${state.selectedKeywords.join(', ')}
[LSI 키워드]: ${state.lsiKeywords.join(', ')}
[타겟 독자]: ${state.target}
[검색 의도]: ${state.searchIntent}
[글 톤]: ${state.tone}
[제품 정보]: ${state.productText || state.productName || '해당 없음'}
[추가 정보]: ${state.additionalInfo || '없음'}

[제품 정보 반영 필수] 위 [제품 정보]나 첨부된 이미지에 실제 제품명·성분·특징이 있다면, 반드시 그 내용을 글 안에서 구체적으로 언급해라. 제품 정보 없이 뭉뚱그린 일반론만 쓰지 말 것. 제품 정보에 여러 개의 제품이 들어있다면, 하나로 뭉뚱그리지 말고 각 제품의 이름과 고유한 특징을 살려서 개별적으로 소개해라.`;


  // 채널별로 동시에(병렬) 생성해서 대기시간을 줄인다. 단, 한번에 너무 많은 요청이 몰리지 않도록
  // CONCURRENCY 개씩 묶어서 처리한다.
  const CONCURRENCY = 4;
  const queue = state.genProgress.slice();

  async function runOne(p){
    p.status = 'working';
    renderCreate();
    const conf = CHANNELS[p.channel];
    try{
      const imgs = [...state.productImages, ...(p.channel==='naver_blog' ? state.blogImages : [])].slice(0, 10);
      const text = await callGemini({
        prompt: ctxBlock + "\n\n" + conf.instructions + "\n\n[형식 준수 필수] 위에 나열된 섹션을 순서대로 전부 작성하고, 각 섹션 제목은 반드시 [대괄호]로 감싸서 한 줄에 단독으로 적어. 마크다운 기호(**, ##, ---, * 등)는 절대 쓰지 말고, 사고 과정이나 설명 없이 바로 결과물만 출력해.",
        images: imgs,
        useWebSearch: conf.webSearch,
        maxTokens: conf.maxTokens,
        onRetry: ()=>{ p.status = 'retrying'; renderCreate(); }
      });
      state.results[p.channel] = text;
      p.status = 'done';
    }catch(e){
      p.status = 'error';
      state.results[p.channel] = '생성 실패: ' + e.message;
    }
    renderCreate();
  }

  async function worker(){
    while(queue.length){
      const p = queue.shift();
      await runOne(p);
    }
  }
  await Promise.all(Array.from({length: Math.min(CONCURRENCY, queue.length)}, worker));

  // 결과 화면을 먼저 보여주고, 히스토리 저장은 백그라운드로 돌린다
  // (Redis 저장이 느리거나 실패해도 결과 화면 전환이 막히지 않도록)
  state.step = 4;
  state.isGenerating = false;
  renderCreate();
  saveToHistory().catch(()=>{});
}

function parseSections(text){
  const lines = text.split('\n');
  const sections = [];
  let current = null;
  for(const line of lines){
    const m = line.match(/^\s*\[(.+?)\]\s*$/);
    if(m){ current = { title:m[1], lines:[] }; sections.push(current); }
    else{ if(!current){ current = { title:'', lines:[] }; sections.push(current); } current.lines.push(line); }
  }
  return sections.filter(s=>s.title || s.lines.some(l=>l.trim()));
}

function renderSections(text, channelKey){
  const sections = parseSections(text || '');
  if(!sections.length){
    return `<div class="sec-block">
      <div class="small-muted">⚠️ 생성된 내용이 비어있어요. (모델이 빈 응답을 반환했거나 안전 필터에 걸렸을 수 있어요)</div>
      ${channelKey ? `<button class="secondary" style="width:100%; margin-top:8px;" data-regen="${channelKey}">🔁 이 채널만 다시 생성</button>` : ''}
    </div>`;
  }
  return sections.map((sec,i)=>{
    const content = sec.lines.join('\n').trim();
    if(sec.title.includes('해시태그')){
      const tagLines = sec.lines.filter(l=>l.trim());
      let out = '';
      tagLines.forEach(l=>{
        const tags = (l.match(/#\S+/g) || []);
        const cls = l.includes('대형') ? 'tag-lg' : l.includes('중형') ? 'tag-md' : l.includes('소형') ? 'tag-sm' : 'tag-md';
        if(tags.length) out += tags.map(t=>`<span class="tag-badge ${cls}">${t}</span>`).join('');
        else out += `<div>${escapeHtml(l)}</div>`;
      });
      return sectionWrap(sec.title, out, content, i);
    }
    if(sec.title==='AI 검증'){
      const items = sec.lines.filter(l=>l.includes('|')).map(l=>{
        const [label, rest] = l.split(':');
        const [icon, reason] = (rest||'').split('|');
        return `<div class="verify-item"><b>${(label||'').trim()}</b>${(icon||'').trim()} ${(reason||'').trim()}</div>`;
      }).join('');
      return sectionWrap(sec.title, `<div class="verify-grid">${items}</div>`, content, i);
    }
    return sectionWrap(sec.title, `<div class="sec-content">${escapeHtml(content)}</div>`, content, i);
  }).join('');
}
function sectionWrap(title, innerHtml, rawContent, i){
  return `<div class="sec-block">
    <div class="sec-title-row"><span class="sec-title">${title||'내용'}</span><button class="sec-copy" data-copysec="${encodeURIComponent(rawContent)}">📋 복사</button></div>
    ${innerHtml}
  </div>`;
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function attachStep4Events(){
  const backEdit = document.getElementById('btn-back-edit');
  if(backEdit) backEdit.onclick = ()=>{ state.step=2; renderCreate(); };
  const expandAll = document.getElementById('btn-expand-all');
  if(expandAll) expandAll.onclick = ()=>{ state.selectedChannels.forEach(c=>openAccordions[c]=true); renderCreate(); };
  const collapseAll = document.getElementById('btn-collapse-all');
  if(collapseAll) collapseAll.onclick = ()=>{ state.selectedChannels.forEach(c=>openAccordions[c]=false); renderCreate(); };

  document.querySelectorAll('[data-acchead]').forEach(el=>{
    el.onclick = ()=>{ const c = el.dataset.acchead; openAccordions[c] = !openAccordions[c]; renderCreate(); };
  });
  document.querySelectorAll('[data-copyall]').forEach(el=>{
    el.onclick = ()=>{ copyText(state.results[el.dataset.copyall]); };
  });
  document.querySelectorAll('[data-copysec]').forEach(el=>{
    el.onclick = ()=>{ copyText(decodeURIComponent(el.dataset.copysec)); };
  });
  document.querySelectorAll('[data-regen]').forEach(el=>{
    el.onclick = ()=> regenerateChannel(el.dataset.regen);
  });
}

async function regenerateChannel(channelKey){
  const conf = CHANNELS[channelKey];
  if(!conf) return;
  toast(`${conf.label} 다시 생성 중...`);
  const ctxBlock = `[주제/제품]: ${state.topic}
[메인 키워드]: ${state.selectedKeywords.join(', ')}
[LSI 키워드]: ${state.lsiKeywords.join(', ')}
[타겟 독자]: ${state.target}
[검색 의도]: ${state.searchIntent}
[글 톤]: ${state.tone}
[제품 정보]: ${state.productText || state.productName || '해당 없음'}
[추가 정보]: ${state.additionalInfo || '없음'}

[제품 정보 반영 필수] 위 [제품 정보]나 첨부된 이미지에 실제 제품명·성분·특징이 있다면, 반드시 그 내용을 글 안에서 구체적으로 언급해라. 제품 정보 없이 뭉뚱그린 일반론만 쓰지 말 것. 제품 정보에 여러 개의 제품이 들어있다면, 하나로 뭉뚱그리지 말고 각 제품의 이름과 고유한 특징을 살려서 개별적으로 소개해라.`;
  try{
    const imgs = [...state.productImages, ...(channelKey==='naver_blog' ? state.blogImages : [])].slice(0, 10);
    const text = await callGemini({
      prompt: ctxBlock + "\n\n" + conf.instructions + "\n\n[형식 준수 필수] 위에 나열된 섹션을 순서대로 전부 작성하고, 각 섹션 제목은 반드시 [대괄호]로 감싸서 한 줄에 단독으로 적어. 마크다운 기호(**, ##, ---, * 등)는 절대 쓰지 말고, 사고 과정이나 설명 없이 바로 결과물만 출력해.",
      images: imgs,
      useWebSearch: conf.webSearch,
      maxTokens: conf.maxTokens
    });
    state.results[channelKey] = text;
    toast(`${conf.label} 재생성 완료`);
  }catch(e){
    state.results[channelKey] = '생성 실패: ' + e.message;
    toast(`${conf.label} 재생성 실패: ` + e.message);
  }
  saveToHistory().catch(()=>{});
  renderCreate();
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>toast('복사했어요')).catch(()=>toast('복사 실패'));
}

/* first channel open by default when entering step4 */
const _origRenderCreate = renderCreate;

/* ============================= HISTORY ============================= */
async function saveToHistory(){
  try{
    const id = 'h' + Date.now();
    const entry = {
      id, topic: state.topic, channels: state.selectedChannels.slice(),
      date: new Date().toISOString(), hasResult: true
    };
    let hist = lsGet('ronai:hist', []);
    if(!Array.isArray(hist)) hist = [];
    hist.unshift(entry);
    hist = hist.slice(0, HIST_MAX);
    const ok1 = lsSet('ronai:hist', hist);
    const ok2 = lsSet('ronai:result:'+id, state.results);
    console.log('[RONAI] 히스토리 저장됨:', entry, { ok1, ok2 });
    if(!ok1 || !ok2){
      toast('⚠️ 히스토리 저장에 실패했어요 (저장공간 부족). 결과는 화면에 남아있으니 지금 복사해두세요.');
    }
    redisSet('ronai:hist', hist);
    redisSet('ronai:result:'+id, state.results);
  }catch(e){
    console.error('[RONAI] 히스토리 저장 실패:', e);
    toast('⚠️ 히스토리 저장에 실패했어요. 결과는 화면에 남아있으니 지금 복사해두세요.');
  }
}

async function renderHistory(){
  const main = document.getElementById('main');
  let hist = lsGet('ronai:hist', []);
  if(!Array.isArray(hist)){ console.warn('[RONAI] localStorage 히스토리가 배열이 아님, 초기화:', hist); hist = []; }
  console.log('[RONAI] localStorage 히스토리:', hist);
  if(!hist.length){
    const remote = await redisGet('ronai:hist');
    console.log('[RONAI] Redis 히스토리:', remote);
    if(Array.isArray(remote)) hist = remote;
    else if(remote) console.warn('[RONAI] Redis 히스토리가 배열이 아님, 무시:', remote);
  }
  if(!hist.length){
    main.innerHTML = `<div class="empty">아직 생성한 콘텐츠가 없어요.</div>
      <button class="secondary" id="btn-refresh-hist" style="width:100%;">🔄 새로고침</button>`;
    document.getElementById('btn-refresh-hist').onclick = renderHistory;
    return;
  }
  main.innerHTML = `
    <div class="row" style="margin-bottom:10px;">
      <button class="secondary" id="btn-refresh-hist">🔄 새로고침</button>
      <button class="secondary" id="btn-clear-hist">전체 삭제</button>
    </div>
    ${hist.filter(h=>h && typeof h==='object').map(h=>{
      const hasLocalResult = !!localStorage.getItem('ronai:result:'+h.id);
      return `
      <div class="hist-item" data-histid="${h.id||''}">
        <div>
          <div>${hasLocalResult ? '📄' : '🔁'} ${h.topic||'(제목 없음)'}</div>
          <div class="meta">${h.date ? new Date(h.date).toLocaleString('ko-KR') : ''} · ${Array.isArray(h.channels) ? h.channels.map(c=>CHANNELS[c]?CHANNELS[c].label:c).join(', ') : ''}</div>
        </div>
        <button class="sec-copy" data-histdel="${h.id||''}">삭제</button>
      </div>`;
    }).join('')}
  `;
  document.getElementById('btn-refresh-hist').onclick = renderHistory;
  document.getElementById('btn-clear-hist').onclick = async ()=>{
    lsSet('ronai:hist', []);
    await redisDel('ronai:hist');
    renderHistory();
  };
  document.querySelectorAll('[data-histdel]').forEach(el=>{
    el.onclick = async (ev)=>{
      ev.stopPropagation();
      const id = el.dataset.histdel;
      let h = lsGet('ronai:hist', []);
      if(!Array.isArray(h)) h = [];
      h = h.filter(x=>x.id!==id);
      lsSet('ronai:hist', h);
      await redisSet('ronai:hist', h);
      renderHistory();
    };
  });
  document.querySelectorAll('[data-histid]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.histid;
      let result = lsGet('ronai:result:'+id, null);
      if(!result) result = await redisGet('ronai:result:'+id);
      const h = hist.find(x=>x.id===id);
      if(!result || typeof result !== 'object'){
        toast('저장된 결과가 없어요. 재생성 화면으로 이동할게요.');
        if(h){
          state.topic = h.topic || '';
          state.selectedChannels = Array.isArray(h.channels) ? h.channels.slice() : [];
          state.step = 1;
        }
        switchTab('create');
        return;
      }
      openResultModal(h, result);
    };
  });
}

function openResultModal(h, result){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>${h.topic||'(제목 없음)'}</h3>
    <div class="small-muted" style="margin-bottom:10px;">${h.date ? new Date(h.date).toLocaleString('ko-KR') : ''}</div>
    ${(Array.isArray(h.channels) ? h.channels : []).map(c=>`<div class="accordion-item open"><div class="accordion-head">${CHANNELS[c]?CHANNELS[c].label:c}</div><div class="accordion-body">${renderSections((result||{})[c]||'', c)}</div></div>`).join('')}
    <div class="modal-close"><button class="secondary" onclick="this.closest('.modal-overlay').remove()">닫기</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-copysec]').forEach(el=>{
    el.onclick = ()=> copyText(decodeURIComponent(el.dataset.copysec));
  });
}

/* ============================= MODALS ============================= */
function openApiKeyModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>🔑 Gemini API 키</h3>
    <p class="small-muted">AQ. 로 시작하는 Gemini API 키를 입력해주세요. 브라우저에만 저장되며 외부로 전송되지 않아요 (Gemini API 호출 시 x-goog-api-key 헤더로만 사용).</p>
    <input type="text" id="api-key-input" placeholder="AQ...." value="${getApiKey()}">
    <button class="primary" style="margin-top:12px;" id="save-api-key">저장</button>
    <div class="modal-close"><button class="secondary" onclick="this.closest('.modal-overlay').remove()">닫기</button></div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('save-api-key').onclick = ()=>{
    const val = document.getElementById('api-key-input').value.trim();
    if(val){ localStorage.setItem('ronai:gemini_key', val); toast('API 키를 저장했어요'); }
    overlay.remove();
  };
}

function openPromptModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>📋 통합 브랜드 프롬프트</h3>
    <p class="small-muted">외부 도구에서도 사용할 수 있도록 RONAI 브랜드 시스템 프롬프트 전체를 복사할 수 있어요.</p>
    <div class="sec-content" style="max-height:40vh; overflow-y:auto; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px;">${escapeHtml(SYSTEM_PROMPT)}</div>
    <button class="primary" style="margin-top:12px;" onclick="copyText(${JSON.stringify(SYSTEM_PROMPT)})">📋 전체 복사</button>
    <div class="modal-close"><button class="secondary" onclick="this.closest('.modal-overlay').remove()">닫기</button></div>
  </div>`;
  document.body.appendChild(overlay);
}

/* ============================= INIT ============================= */
window.addEventListener('dragover', e=> e.preventDefault());
window.addEventListener('drop', e=> e.preventDefault());
render();
if(!getApiKey()) setTimeout(openApiKeyModal, 400);
